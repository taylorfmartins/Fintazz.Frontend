name: Deploy Dev

on:
  push:
    branches: [develop]

env:
  IMAGE: ghcr.io/taylorfmartins/fintazz-frontend

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:dev

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Write compose file, pull and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            mkdir -p ~/fintazz-frontend/dev
            cat > ~/fintazz-frontend/dev/docker-compose.dev.yml << 'COMPOSE'
            services:
              frontend:
                image: ghcr.io/taylorfmartins/fintazz-frontend:dev
                container_name: fintazz-frontend-dev
                ports:
                  - "3001:80"
                env_file: .env
                restart: unless-stopped
            COMPOSE

            cd ~/fintazz-frontend/dev
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.dev.yml pull
            docker compose -f docker-compose.dev.yml up -d
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
