name: Deploy Prod

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/taylorfmartins/fintazz-frontend

jobs:
  retag:
    name: Retag :dev as :latest
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag dev image as latest
        run: |
          docker pull ${{ env.IMAGE }}:dev
          docker tag  ${{ env.IMAGE }}:dev ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to VPS
    needs: retag
    runs-on: ubuntu-latest

    steps:
      - name: Write compose file, pull and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            mkdir -p ~/fintazz-frontend/production
            cat > ~/fintazz-frontend/production/docker-compose.prod.yml << 'COMPOSE'
            services:
              frontend:
                image: ghcr.io/taylorfmartins/fintazz-frontend:latest
                container_name: fintazz-frontend
                ports:
                  - "3000:80"
                env_file: .env
                restart: unless-stopped
            COMPOSE

            cd ~/fintazz-frontend/production
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
