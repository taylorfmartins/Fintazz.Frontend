server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
    gzip_min_length 1000;

    # Sem cache para index.html, appsettings e service worker
    location ~* (index\.html|appsettings.*\.json|service-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets fingerprinted do Blazor – cache permanente
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Outros assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback – todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
